name: Release

on:
  # Only run on pushes to master. The workflow creates the tag/release itself,
  # so triggering on tag pushes would re-run it against the tag it just made.
  push:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  # Required to create tags and releases.
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v7
      with:
        # semver-action needs full history and all tags to compare against the latest one.
        fetch-depth: 0

    - name: Get Next Version
      id: semver
      uses: ietf-tools/semver-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: master
        # Never allow an automatic major bump - releases stay within 2.x.
        majorList: ""
        patchAll: true
        # If no commit maps to a bump, fall back to a patch instead of erroring out.
        noVersionBumpBehavior: patch
        # If HEAD is already at the latest tag, keep the current version instead of erroring.
        noNewCommitBehavior: current

    - name: Create release
      # Only release when the computed version is actually newer than the latest tag.
      if: ${{ steps.semver.outputs.nextStrict != steps.semver.outputs.currentStrict }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NEXT_VERSION: ${{ steps.semver.outputs.nextStrict }}
      run: |
        echo "Previous: ${{ steps.semver.outputs.currentStrict }}"
        echo "Next:     ${NEXT_VERSION}"
        # Creates the tag at the current commit and a release with auto-generated notes
        # (built by GitHub from the commits/PRs since the previous tag).
        gh release create "${NEXT_VERSION}" \
          --target "${GITHUB_SHA}" \
          --title "${NEXT_VERSION}" \
          --generate-notes
